<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 days with my Celine</title>
  
  <!-- Bootstrap 3.4.1 for layout structure -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
  <!-- Elegant cursive font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f7aef8 100%);
      overflow: hidden;
      position: relative;
    }

    /* Full screen photo grid background wrapper */
    #grid-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      padding: 0;
      margin: 0;
    }

    .grid-row {
      display: flex;
      height: 10vh;
      margin: 0;
      padding: 0;
    }

    .grid-slot {
      flex: 1;
      height: 100%;
      box-sizing: border-box;
      position: relative;
    }

    /* Cinematic Grey Dimming/Blur Overlay */
    #cinematic-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(40, 40, 45, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 14;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #cinematic-overlay.active {
      opacity: 1;
      pointer-events: auto; /* Allows clicking on background to dismiss */
    }

    /* Dynamic Preview Caption Element */
    #preview-caption-wrapper {
      position: fixed;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      z-index: 16;
      text-align: center;
      width: 80%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .preview-caption-text {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      color: #ffffff;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 71, 126, 0.6);
      margin: 0;
    }

    /* Flying images */
    .flying-photo {
      position: fixed;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      pointer-events: none; 
      z-index: 15;
    }

    .flying-photo.docked {
      object-fit: cover;
      border: 2px solid white;
      border-radius: 4px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* Central control card wrapper */
    .card-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(255, 75, 110, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      text-align: center;
      max-width: 450px;
      width: 85%;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: auto;
    }

    .card.celebrate {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 50px rgba(255, 71, 126, 0.8);
      transform: scale(1.05);
    }

    h1 {
      color: #ff477e;
      font-size: 1.8rem;
      margin-bottom: 5px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
    }

    .subtitle {
      color: #705a60;
      font-size: 0.95rem;
      margin-top: 0;
      margin-bottom: 25px;
      font-style: italic;
    }

    #counter-wrapper {
      font-size: 4rem;
      font-weight: bold;
      color: #ff477e;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), margin-bottom 0.6s ease;
    }

    .heart-icon {
      font-size: 3rem;
      display: inline-block;
    }

    .heart-pulse {
      animation: pulse 1.5s infinite;
    }

    .heart-explode {
      animation: explodeHeart 1s ease-out forwards;
    }

    #increment-btn, #gallery-reveal-btn {
      padding: 15px 35px;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #increment-btn {
      background: linear-gradient(45deg, #ff477e, #ff7096);
      box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
    }

    #increment-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 6px 20px rgba(255, 71, 126, 0.6);
    }

    #gallery-reveal-btn {
      background: linear-gradient(45deg, #ff7096, #f7aef8);
      box-shadow: 0 4px 15px rgba(247, 174, 248, 0.4);
      display: none;
      opacity: 0;
      margin: 15px auto 0 auto;
    }

    #anniversary-message {
      display: none;
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      color: #ff477e;
      margin: 15px 0 10px 0;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.8s ease, transform 0.8s ease;
      line-height: 1.2;
    }

    /* Floating Separate Window at the Bottom for Countdown */
    .countdown-container {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 30px;
      border-radius: 50px;
      box-shadow: 0 8px 24px rgba(255, 71, 126, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
      z-index: 30; 
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .countdown-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 4px;
      font-weight: 600;
    }

    #countdown {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.4rem;
      font-weight: bold;
      color: #9e0031;
      text-shadow: 0 0 6px rgba(158, 0, 49, 0.2);
      letter-spacing: 1px;
    }

    /* --- 3D ROTATING CUBE GALLERY MODULE INTERFACE --- */
    #cube-gallery-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 12, 15, 0.95);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease;
      perspective: 1200px;
    }

    .gallery-stage {
      width: 100%;
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .cube-carousel {
      position: relative;
      width: 320px;
      height: 420px;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.2, 0.85, 0.32, 1.02);
    }

    .cube-card {
      position: absolute;
      width: 320px;
      height: 420px;
      left: 0;
      top: 0;
      background: #1a151a;
      border: 6px solid white;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transition: opacity 0.5s ease, filter 0.5s ease;
    }

    .cube-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Gallery HUD Controls */
    .gallery-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      font-size: 2.5rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 110;
      transition: all 0.3s ease;
    }

    .gallery-nav-btn:hover {
      background: rgba(255, 71, 126, 0.4);
      color: white;
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 0 15px rgba(255, 71, 126, 0.4);
    }

    .nav-left { left: 40px; }
    .nav-right { right: 40px; }

    /* Elegant Interactive Caption Window Area */
    .gallery-caption-box {
      width: 100%;
      height: 20vh;
      text-align: center;
      padding: 10px 40px;
      box-sizing: border-box;
    }

    .caption-text {
      font-family: 'Great Vibes', cursive;
      font-size: 2.6rem;
      color: #ff7096;
      margin: 0;
      text-shadow: 0 2px 10px rgba(255, 112, 150, 0.2);
    }

    .caption-subtext {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      color: #aaa;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .close-gallery-btn {
      position: absolute;
      top: 25px;
      right: 35px;
      background: none;
      border: 2px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 120;
    }

    .close-gallery-btn:hover {
      border-color: #ff477e;
      color: #ff477e;
    }

    /* Core animations */
    .floating-heart {
      position: absolute;
      color: rgba(255, 71, 126, 0.4);
      pointer-events: none;
      font-size: 1.5rem;
      animation: float 4s linear infinite;
      bottom: -10%;
      z-index: 6;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 25; 
      border-radius: 50%;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes pulse-fast {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes explodeHeart {
      0% { transform: scale(1); }
      30% { transform: scale(2.5) rotate(-15deg); filter: drop-shadow(0 0 20px #ff477e); }
      100% { transform: scale(1.2); }
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) translateX(var(--random-x)) rotate(360deg); opacity: 0; }
    }

    @keyframes explodeConfetti {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) rotate(var(--r)); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Full Screen Photo Matrix Grid -->
  <div class="container-fluid" id="grid-container"></div>

  <!-- Cinematic Focus Overlay Backplane (Controls background clicking) -->
  <div id="cinematic-overlay" onclick="forceActivePhotoToFly()"></div>

  <!-- Shared Captions Wrapper for Active Previews -->
  <div id="preview-caption-wrapper">
    <p class="preview-caption-text" id="preview-caption-node"></p>
  </div>

  <!-- Interactive Control Panel Card Window Overlay -->
  <div class="card-wrapper" id="primary-ui-wrapper">
    <div class="card" id="main-card">
      <h1 id="main-title">Happy 100 Days My Baby</h1>
      <p class="subtitle" id="main-subtitle">Every day with you is a blessing.</p>
      
      <div id="counter-wrapper">
        <span class="heart-icon heart-pulse" id="main-heart">💖</span>
        <span id="counter">0</span>
      </div>
      
      <button id="increment-btn" onclick="increment()">Press Me!</button>

      <div id="anniversary-message">Happy 100 day anniversary my baby!</div>

      <button id="gallery-reveal-btn" onclick="openGallery()">View Gallery 🌸</button>
    </div>
  </div>

  <!-- Floating Isolated Widget Bottom Phase Timer Window -->
  <div class="countdown-container" id="countdown-section">
    <div class="countdown-title">Time Remaining Until The Next Phase</div>
    <div id="countdown">00d 00h 00m 00s</div>
  </div>

  <!-- Immersive 3D Matrix Rotating Cube Viewport Overlay Window Frame -->
  <div id="cube-gallery-overlay">
    <button class="close-gallery-btn" onclick="closeGallery()">✕ Close</button>
    
    <button class="gallery-nav-btn nav-left" onclick="rotateCube(-1)">‹</button>
    <button class="gallery-nav-btn nav-right" onclick="rotateCube(1)">›</button>

    <div class="gallery-stage">
      <div class="cube-carousel" id="cube-wrapper"></div>
    </div>

    <div class="gallery-caption-box">
      <div class="caption-text" id="photo-caption">Loading memory lane...</div>
      <div class="caption-subtext" id="photo-index-tag">Memory 1 of 100</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>

  <script>
    let count = 0;
    let isGalleryActive = false;
    let currentActiveFlightTimeout = null; // References active timers to allow clean override clearing
    let activeFlyingImageElement = null;   // Tracks active node processing target
    let activeSlotIndexPointer = null;     // Tracks targeted slot storage positioning parameters
    
    const colors = ['#ff477e', '#ff7096', '#ff85a1', '#f7aef8', '#fff', '#ffd166', '#06d6a0'];
    
    const totalAvailableImages = 110; 
    let randomizedImagePool = [];

    // Master Captions Database Pool List Array
    const captionsPlaceholderList = [
      "You look absolutely beautiful here... ✨",
      "One of my favorite memories with you. ❤️",
      "Every single smile of yours brightens my whole world.",
      "The day I realized how incredibly lucky I am to have you.",
      "Holding your hand makes everything else disappear."
    ];

    for (let i = 1; i <= totalAvailableImages; i++) {
      randomizedImagePool.push(i);
    }

    // Fisher-Yates Shuffle Algorithm
    for (let i = randomizedImagePool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [randomizedImagePool[i], randomizedImagePool[j]] = [randomizedImagePool[j], randomizedImagePool[i]];
    }

    const definitiveSelection = randomizedImagePool.slice(0, 100);

    // Generate the baseline grid system automatically on load
    const gridContainer = document.getElementById('grid-container');
    let slotIdCounter = 0;
    for (let r = 0; r < 10; r++) {
      const rowDiv = document.createElement('div');
      rowDiv.classList.add('grid-row');
      for (let c = 0; c < 10; c++) {
        const slotDiv = document.createElement('div');
        slotDiv.classList.add('grid-slot');
        slotDiv.id = `slot-${slotIdCounter}`;
        rowDiv.appendChild(slotDiv);
        slotIdCounter++;
      }
      gridContainer.appendChild(rowDiv);
    }

    // Global Key Listener
    window.addEventListener('keydown', (e) => {
      if (e.code === "Space") {
        e.preventDefault(); 
        const btn = document.getElementById('increment-btn');
        // Spacebar is blocked if button is disabled (photo is actively displaying)
        if (btn && !btn.disabled && count < 100) {
          btn.click();
        }
      }
      if (isGalleryActive) {
        if (e.key === "ArrowLeft") rotateCube(-1);
        if (e.key === "ArrowRight") rotateCube(1);
        if (e.key === "Escape") closeGallery();
      }
    });

    function increment() {
      if (count < 100) {
        document.getElementById('increment-btn').disabled = true;

        const chosenImageNumber = definitiveSelection[count];
        const nextImgSrc = `Celine/Celine (${chosenImageNumber}).webp`; 
        
        spawnAndFlyImage(nextImgSrc, count);

        count++;
        document.getElementById('counter').innerText = count;
        
        if (count === 100) {
          triggerCelebration();
        } else {
          createHeart();
        }
      } else {
        createHeart(); 
      }
    }

    function spawnAndFlyImage(imgSrc, slotIndex) {
      const img = document.createElement('img');
      const overlay = document.getElementById('cinematic-overlay');
      const captionWrapper = document.getElementById('preview-caption-wrapper');
      const captionTextNode = document.getElementById('preview-caption-node');
      
      img.src = imgSrc;
      img.classList.add('flying-photo');

      img.style.maxWidth = '85vw';
      img.style.maxHeight = '65vh';
      img.style.width = 'auto';
      img.style.height = 'auto';
      img.style.opacity = '0';
      img.style.left = '50%';
      img.style.top = '45%';
      img.style.transform = 'translate(-50%, -50%) scale(0.8)';

      document.body.appendChild(img);
      
      // Update global trackers
      activeFlyingImageElement = img;
      activeSlotIndexPointer = slotIndex;

      // Mount background dimmer overlay
      overlay.classList.add('active');

      // Sync and reveal caption immediately beneath the photo
      const pickedText = captionsPlaceholderList[slotIndex % captionsPlaceholderList.length];
      captionTextNode.innerText = pickedText;
      captionWrapper.style.opacity = '1';

      setTimeout(() => {
        img.style.opacity = '1';
        img.style.transform = 'translate(-50%, -50%) scale(1)';
      }, 50);

      // Initialize the standard 5-second automatic fallback timer
      currentActiveFlightTimeout = setTimeout(() => {
        sendActivePhotoToDock();
      }, 5000); 
    }

    // --- STRATEGIC INTERCEPT TRIGGER: DETECTS OUTSIDE BACKDROP CLICKS ---
    function forceActivePhotoToFly() {
      // Clear out the active fallback scheduler queue loop immediately
      if (currentActiveFlightTimeout) {
        clearTimeout(currentActiveFlightTimeout);
        currentActiveFlightTimeout = null;
      }
      sendActivePhotoToDock();
    }

    function sendActivePhotoToDock() {
      if (!activeFlyingImageElement) return;

      const overlay = document.getElementById('cinematic-overlay');
      const captionWrapper = document.getElementById('preview-caption-wrapper');
      const targetSlot = document.getElementById(`slot-${activeSlotIndexPointer}`);
      
      if (!targetSlot) return;
      const rect = targetSlot.getBoundingClientRect();

      // Lift backdrop blur and turn off captions smoothly
      overlay.classList.remove('active');
      captionWrapper.style.opacity = '0';

      // Fire transformation geometry changes
      activeFlyingImageElement.classList.add('docked');
      activeFlyingImageElement.style.transform = 'none';
      activeFlyingImageElement.style.left = rect.left + 'px';
      activeFlyingImageElement.style.top = rect.top + 'px';
      activeFlyingImageElement.style.width = rect.width + 'px';
      activeFlyingImageElement.style.height = rect.height + 'px';
      activeFlyingImageElement.style.zIndex = '2';

      // Clear layout pointers
      activeFlyingImageElement = null;

      // Unlock button triggers so Celine can press space or tap to add the next image
      if (count < 100) {
        document.getElementById('increment-btn').disabled = false;
      }
    }

    window.addEventListener('resize', () => {
      const allPhotos = document.querySelectorAll('.flying-photo.docked');
      allPhotos.forEach((img, idx) => {
        const targetSlot = document.getElementById(`slot-${idx}`);
        if (targetSlot) {
          const rect = targetSlot.getBoundingClientRect();
          img.style.width = rect.width + 'px';
          img.style.height = rect.height + 'px';
          img.style.left = rect.left + 'px';
          img.style.top = rect.top + 'px';
        }
      });
      if (isGalleryActive) buildCubeLayout();
    });

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('floating-heart');
      heart.innerHTML = '❤️';
      
      const randomLeft = Math.random() * 100;
      const randomSize = Math.random() * (2.5 - 1) + 1;
      const randomXMovement = (Math.random() * 200 - 100) + 'px';
      
      heart.style.left = randomLeft + 'vw';
      heart.style.fontSize = randomSize + 'rem';
      heart.style.setProperty('--random-x', randomXMovement);
      
      const randomDuration = Math.random() * (5 - 3) + 3;
      heart.style.animationDuration = randomDuration + 's';

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), randomDuration * 1000);
    }

    function triggerCelebration() {
      const card = document.getElementById('main-card');
      const heart = document.getElementById('main-heart');
      const counterWrapper = document.getElementById('counter-wrapper');
      const btn = document.getElementById('increment-btn');
      const msg = document.getElementById('anniversary-message');
      const galleryBtn = document.getElementById('gallery-reveal-btn');
      const countdownSection = document.getElementById('countdown-section');

      card.classList.add('celebrate');
      heart.classList.remove('heart-pulse');
      heart.classList.add('heart-explode');

      btn.style.opacity = '0';
      setTimeout(() => {
        btn.remove();
        galleryBtn.style.display = 'block';
        setTimeout(() => {
          galleryBtn.style.opacity = '1';
        }, 50);
      }, 400);

      counterWrapper.style.transform = 'translateY(-15px)';
      counterWrapper.style.marginBottom = '5px';

      msg.style.display = 'block';
      setTimeout(() => {
        msg.style.opacity = '1';
        msg.style.transform = 'scale(1)';
      }, 100);

      countdownSection.style.display = 'block';
      setTimeout(() => {
        countdownSection.style.opacity = '1';
        countdownSection.style.transform = 'translateX(-50%) translateY(0)';
      }, 150);

      for (let i = 0; i < 150; i++) {
        createConfettiParticle();
      }

      setTimeout(() => {
        card.classList.remove('celebrate');
      }, 2000);
      
      startCountdown();
      initializeCubeData(); 
    }

    // --- 3D ROTATING CAROUSEL GALLERY VIEWPORT ---
    let currentActiveCubeIndex = 0;
    const radiusOf3DRing = 600; 

    function initializeCubeData() {
      const cubeWrapper = document.getElementById('cube-wrapper');
      cubeWrapper.innerHTML = ''; 

      definitiveSelection.forEach((imageNumber, index) => {
        const item = document.createElement('div');
        item.classList.add('cube-card');
        item.id = `cube-card-${index}`;
        
        const img = document.createElement('img');
        img.src = `Celine/Celine (${imageNumber}).webp`;
        img.loading = "lazy"; 
        
        item.appendChild(img);
        cubeWrapper.appendChild(item);
      });
    }

    function buildCubeLayout() {
      definitiveSelection.forEach((_, index) => {
        const item = document.getElementById(`cube-card-${index}`);
        if (!item) return;

        const anglePerItem = 360 / 100;
        const itemAngle = anglePerItem * index;
        item.style.transform = `rotateY(${itemAngle}deg) translateZ(${radiusOf3DRing}px)`;
      });
      updateCubeRenderingState();
    }

    function rotateCube(direction) {
      currentActiveCubeIndex = (currentActiveCubeIndex + direction + 100) % 100;
      updateCubeRenderingState();
    }

    function updateCubeRenderingState() {
      const cubeWrapper = document.getElementById('cube-wrapper');
      const anglePerItem = 360 / 100;
      
      const finalCarouselAngleChange = -anglePerItem * currentActiveCubeIndex;
      cubeWrapper.style.transform = `translateZ(-${radiusOf3DRing}px) rotateY(${finalCarouselAngleChange}deg)`;

      definitiveSelection.forEach((_, index) => {
        const item = document.getElementById(`cube-card-${index}`);
        if (!item) return;

        let spatialDifference = Math.abs(index - currentActiveCubeIndex);
        if (spatialDifference > 50) spatialDifference = 100 - spatialDifference;

        if (spatialDifference === 0) {
          item.style.opacity = '1';
          item.style.filter = 'none';
          item.style.zIndex = '10';
        } else if (spatialDifference <= 2) {
          item.style.opacity = '0.45';
          item.style.filter = 'blur(1.5px) grayscale(20%)';
          item.style.zIndex = '5';
        } else {
          item.style.opacity = '0';
          item.style.zIndex = '1';
        }
      });
      
      const pickedTextString = captionsPlaceholderList[currentActiveCubeIndex % captionsPlaceholderList.length];
      document.getElementById('photo-caption').innerText = `${pickedTextString} (Photo #${definitiveSelection[currentActiveCubeIndex]})`;
      document.getElementById('photo-index-tag').innerText = `Memory ${currentActiveCubeIndex + 1} of 100`;
    }

    function openGallery() {
      isGalleryActive = true;
      document.getElementById('primary-ui-wrapper').style.opacity = '0';
      document.getElementById('primary-ui-wrapper').style.pointerEvents = 'none';
      
      const overlay = document.getElementById('cube-gallery-overlay');
      overlay.style.display = 'block';
      buildCubeLayout();
      
      setTimeout(() => {
        overlay.style.opacity = '1';
      }, 50);
    }

    function closeGallery() {
      isGalleryActive = false;
      const overlay = document.getElementById('cube-gallery-overlay');
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        document.getElementById('primary-ui-wrapper').style.opacity = '1';
        document.getElementById('primary-ui-wrapper').style.pointerEvents = 'auto';
      }, 500);
    }

    function createConfettiParticle() {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      
      confetti.style.left = '50vw';
      confetti.style.top = '50vh';
      
      const color = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.backgroundColor = color;
      if (Math.random() > 0.5) confetti.style.borderRadius = '0px';

      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 300 + 100;
      const x = Math.cos(angle) * velocity + 'px';
      const y = Math.sin(angle) * velocity + 'px';
      const rotation = (Math.random() * 720 - 360) + 'deg';

      confetti.style.setProperty('--x', x);
      confetti.style.setProperty('--y', y);
      confetti.style.setProperty('--r', rotation);
      
      confetti.style.animation = `explodeConfetti ${Math.random() * 1.5 + 1}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;

      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2500);
    }

    function startCountdown() {
      const targetDate = new Date("July 1, 2026 22:00:00").getTime();

      const timerInterval = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

        if (distance < 0) {
          clearInterval(timerInterval);
          const clockElement = document.getElementById("countdown");
          clockElement.innerHTML = "WILL YOU BE MINE?";
          clockElement.style.color = "#ff0000";
          clockElement.style.fontSize = "1.5rem";
          clockElement.style.letterSpacing = "2px";
          clockElement.style.animation = "pulse-fast 0.8s infinite";
        }
      }, 1000);
    }
  </script>

</body>
