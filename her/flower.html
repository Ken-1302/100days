<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    /* Message Styling */
    .message {
      color: #ff477e;
      font-size: 2.5rem;
      font-weight: bold;
      margin-top: 40px;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.05);
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1.5s; /* Appears beautifully right as the flower opens */
    }

    /* Flower Container */
    .flower {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* The Center Picture Frame */
    .flower-center {
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background-color: #ffd166;
      z-index: 10;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 4px solid white;
    }

    .flower-center img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(0.5);
      animation: revealPic 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.8s;
    }

    /* Petal Base Styling */
    .petal {
      position: absolute;
      width: 90px;
      height: 140px;
      background: linear-gradient(to top, #ff7096, #ff477e);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      transform-origin: bottom center;
      opacity: 0;
      /* Bloom Animation */
      animation: bloom 2s cubic-bezier(0.5, 0, 0.2, 1) forwards;
    }

    /* Arranging petals in a geometric circle and setting individual delays */
    .petal:nth-child(1)  { transform: translateY(-65px) rotate(0deg); animation-delay: 0.1s; }
    .petal:nth-child(2)  { transform: translateY(-65px) rotate(45deg); animation-delay: 0.2s; }
    .petal:nth-child(3)  { transform: translateY(-65px) rotate(90deg); animation-delay: 0.3s; }
    .petal:nth-child(4)  { transform: translateY(-65px) rotate(135deg); animation-delay: 0.4s; }
    .petal:nth-child(5)  { transform: translateY(-65px) rotate(180deg); animation-delay: 0.1s; }
    .petal:nth-child(6)  { transform: translateY(-65px) rotate(225deg); animation-delay: 0.2s; }
    .petal:nth-child(7)  { transform: translateY(-65px) rotate(270deg); animation-delay: 0.3s; }
    .petal:nth-child(8)  { transform: translateY(-65px) rotate(315deg); animation-delay: 0.4s; }

    /* Animations */
    @keyframes bloom {
      0% {
        transform: translateY(-20px) rotate(var(--rotation, 0deg)) scale(0) rotateX(70deg);
        opacity: 0;
      }
      50% {
        opacity: 0.9;
      }
      100% {
        /* Opens outward smoothly */
        transform: translateY(-65px) rotate(var(--rotation, 0deg)) scale(1) rotateX(0deg);
        opacity: 1;
      }
    }

    @keyframes revealPic {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="flower">
    <!-- The 8 Petals around the core -->
    <div class="petal" style="--rotation: 0deg;"></div>
    <div class="petal" style="--rotation: 45deg;"></div>
    <div class="petal" style="--rotation: 90deg;"></div>
    <div class="petal" style="--rotation: 135deg;"></div>
    <div class="petal" style="--rotation: 180deg;"></div>
    <div class="petal" style="--rotation: 225deg;"></div>
    <div class="petal" style="--rotation: 270deg;"></div>
    <div class="petal" style="--rotation: 315deg;"></div>

    <!-- Center Frame containing your picture -->
    <div class="flower-center">
      <!-- Change "your-photo.jpg" to the exact filename of your image -->
      <img src="test.jpg" alt="Centerpiece Photo">
    </div>
  </div>

  <div class="message">I love you ❤️</div>

  <script>
    // Purely optional: This script makes small sparkles drop randomly in the background
    setInterval(() => {
      const sparkle = document.createElement('div');
      sparkle.innerHTML = '✨';
      sparkle.style.position = 'absolute';
      sparkle.style.left = Math.random() * 100 + 'vw';
      sparkle.style.top = '-20px';
      sparkle.style.fontSize = Math.random() * (1.5 - 0.5) + 0.5 + 'rem';
      sparkle.style.opacity = Math.random();
      sparkle.style.pointerEvents = 'none';
      sparkle.style.transition = 'all 4s linear';
      
      document.body.appendChild(sparkle);
      
      setTimeout(() => {
        sparkle.style.transform = 'translateY(105vh) rotate(360deg)';
      }, 50);

      setTimeout(() => sparkle.remove(), 4000);
    }, 400);
  </script>
</body>
</html>
