<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0c0a0c; /* Smooth dark background to blend seamlessly with the rose gif background */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    /* Message Wrapper Container */
    .display-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Rose & Inner Photo Layering Frame Container */
    .flower-box {
      position: relative;
      width: 400px;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Verbatim configuration mapping for the rose asset */
    .rose-underlay {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    /* The Center Picture Frame blooming from the core */
    .photo-centerpiece {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      z-index: 5;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 3px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 25px rgba(255, 112, 150, 0.6);
      
      /* Initial state hidden deeply inside the bud center */
      opacity: 0;
      transform: translate(-2px, -18px) scale(0.1); 
      
      /* Smooth growth animation synced perfectly with the rose blooming cycle */
      animation: bloomOutPhoto 3.2s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
      animation-delay: 1.2s; 
    }

    .photo-centerpiece img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Animated Romance Message */
    .romantic-text {
      color: #ff477e;
      font-size: 2.8rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 20px;
      text-shadow: 0 0 15px rgba(255, 71, 126, 0.4);
      opacity: 0;
      transform: translateY(10px);
      animation: revealMessage 2s ease forwards;
      animation-delay: 2.8s; /* Elegantly glides in right as the picture finishes blooming */
    }

    /* Keyframe Choreography Styles */
    @keyframes bloomOutPhoto {
      0% {
        opacity: 0;
        transform: translate(-2px, -18px) scale(0.1) rotate(-15deg);
        box-shadow: 0 0 0px rgba(255, 112, 150, 0);
      }
      50% {
        opacity: 0.5;
      }
      100% {
        opacity: 1;
        /* Scales to full size exactly tracked onto the center coordinates of the rose asset */
        transform: translate(-2px, -18px) scale(1) rotate(0deg);
        box-shadow: 0 0 25px rgba(255, 112, 150, 0.6), inset 0 0 10px rgba(0,0,0,0.3);
      }
    }

    @keyframes revealMessage {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="display-container">
    <div class="flower-box">
      <img src="rose gif.jpg" alt="Blooming Rose Background" class="rose-underlay">

      <div class="photo-centerpiece">
        <img src="your-photo.jpg" alt="Centerpiece Photo">
      </div>
    </div>

    <div class="romantic-text">❤️ Love you my baby ❤️</div>
  </div>

  <script>
    // --- HIGH-DENSITY FALLING PARTICLE ENGINE ---
    const shapes = ['✨', '🌸', '💖', '░']; // Mix of sparkles, soft petals, and glowing hearts
    const colors = ['#ffccd5', '#fff0f5', '#ffb3c1', '#ffffff'];

    setInterval(() => {
      const sparkle = document.createElement('div');
      
      // Randomly select a shape and color for variety
      sparkle.innerHTML = shapes[Math.floor(Math.random() * shapes.length)];
      sparkle.style.color = colors[Math.floor(Math.random() * colors.length)];
      
      sparkle.style.position = 'absolute';
      sparkle.style.left = Math.random() * 100 + 'vw';
      sparkle.style.top = '-20px';
      
      // Highly dynamic sizing and transparency
      const randomSize = Math.random() * (1.4 - 0.4) + 0.4;
      sparkle.style.fontSize = randomSize + 'rem';
      sparkle.style.opacity = Math.random() * 0.85 + 0.15;
      sparkle.style.pointerEvents = 'none';
      
      // Varied falling speeds (between 3.5 to 7 seconds) to build depth
      const fallDuration = Math.random() * (7 - 3.5) + 3.5;
      sparkle.style.transition = `all ${fallDuration}s linear`;
      
      document.body.appendChild(sparkle);
      
      // Apply the animation transition with random horizontal drifting and spin rotations
      setTimeout(() => {
        const driftDistance = Math.random() * 160 - 80; // Swapping drift window left and right
        sparkle.style.transform = `translateY(105vh) translateX(${driftDistance}px) rotate(${Math.random() * 720 - 360}deg)`;
        sparkle.style.opacity = '0'; // Smoothly fade out right as they hit the floor
      }, 50);

      // Clean up memory
      setTimeout(() => sparkle.remove(), fallDuration * 1000);
    }, 120); // Spawning interval at 120ms for a dense, elegant shower
  </script>
</body>
</html>
